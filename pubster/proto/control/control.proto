syntax = "proto3";
package pubster;

service PubSub {
  rpc GetClientId(ClientIdRequest)   returns (ClientIdResponse);
  rpc ListTopics(ListTopicsRequest)  returns (ListTopicsResponse);
  rpc Subscribe(SubscribeRequest)    returns (stream ReceivedMessage);
  rpc Publish(PublishRequest)        returns (PublishResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
}

// ── Client Identity ───────────────────────────────────────────────────────────

message ClientIdRequest {}

message ClientIdResponse {
  uint32 client_id = 1;
}

// ── Topic Management ──────────────────────────────────────────────────────────

message ListTopicsRequest {}

message ListTopicsResponse {
  repeated string topic_names = 1;
}

// ── Subscribe ─────────────────────────────────────────────────────────────────

message SubscribeRequest {
  uint32 client_id  = 1;
  string topic_name = 2;
}

// Streamed to a subscriber for every message published on the topic.
message ReceivedMessage {
  uint32 message_id   = 1;
  string topic_name   = 2;
  uint32 publisher_id = 3;
  string payload      = 4;
}

// ── Publish ───────────────────────────────────────────────────────────────────

message PublishRequest {
  uint32 client_id  = 1;
  string topic_name = 2;
  string payload    = 3;
}

message PublishResponse {
  uint32 message_id = 1;
}

// ── Unsubscribe ───────────────────────────────────────────────────────────────

message UnsubscribeRequest {
  uint32 client_id  = 1;
  string topic_name = 2;
}

message UnsubscribeResponse {}
