syntax = "proto3";
package pubster;

service PubSub {
  // One persistent connection per client.
  // First ClientEvent must be a ConnectCmd to establish identity.
  rpc Handshake(stream ClientEvent) returns (stream ServerEvent);

  // Stateless query — no client state required.
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
}

// ── Client → Server ───────────────────────────────────────────────────────────

message ClientEvent {
  oneof payload {
    ConnectCmd     connect     = 1;  // must be first message on stream
    SubscribeCmd   subscribe   = 2;
    UnsubscribeCmd unsubscribe = 3;
    PublishCmd     publish     = 4;
  }
}

//Edge case: What if the client_name exactly matches the name, can maybe identify the client
message ConnectCmd     { string client_name = 1; }
message SubscribeCmd   { string topic_name  = 1; }
message UnsubscribeCmd { string topic_name  = 1; }
message PublishCmd     { string topic_name  = 1; string payload = 2; }

// ── Server → Client ───────────────────────────────────────────────────────────

// Pushed for every message on a topic the client is subscribed to,
// or carries an ErrorEvent if the server needs to signal a protocol violation.
message ServerEvent {
  oneof kind {
    MessageEvent message = 1;
    ErrorEvent   error   = 2;
  }
}

message MessageEvent {
  uint32 message_id     = 1;
  string topic_name     = 2;
  string publisher_name = 3;
  string payload        = 4;
}

message ErrorEvent {
  string message = 1;
}

// ── Topic Management ──────────────────────────────────────────────────────────

message ListTopicsRequest  {}
message ListTopicsResponse { repeated string topic_names = 1; }
